apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: douban-analysis
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-southwest-2.myhuaweicloud.com/bronya_land/pyspark:v9
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work/analysis.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: "512m"
    serviceAccount: spark
    volumeMounts:
    - name: script-volume
      mountPath: /opt/spark/work
  executor:
    cores: 1
    instances: 1
    memory: "512m"
    memoryOverhead: "128m"
    volumeMounts:
    - name: script-volume
      mountPath: /opt/spark/work
  volumes:
  - name: script-volume
    configMap:
      name: douban-analysis-script
  hadoopConf:
    "fs.s3a.endpoint": "obs.cn-southwest-2.myhuaweicloud.com"
    "fs.s3a.access.key": "HPUAVEUMOC4E4CFWF2GU"
    "fs.s3a.secret.key": "efy1P2RqWQKoI7d2JSjBtSscYLWhsczjz0yjOCyg"
    "fs.s3a.connection.ssl.enabled": "true"
    "fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "fs.s3a.aws.credentials.provider": "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"